<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TokenHaven | Home</title>
  <style>
    /* --- Universal Layout Reset --- */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
    }

    /* --- Navbar Styling --- */
    .navbar {
      background-color: #1a1a1a;
      border-bottom: 1px solid #2d2d2d;
      padding: 1rem 2rem;
      position: relative;
      z-index: 1000;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }
    .nav-brand {
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffffff;
      text-decoration: none;
      letter-spacing: 0.5px;
    }

    /* --- Menu Desktop Rules --- */
    .nav-menu {
      display: flex;
      gap: 2rem;
    }
    .nav-category {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .category-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888888;
      border-right: 1px solid #444444;
      padding-right: 0.5rem;
      margin-right: 0.25rem;
    }
    .nav-item {
      color: #cccccc;
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s ease;
    }
    .nav-item:hover, .nav-item.active {
      color: #ffffff;
    }

    /* Hide Mobile Controls by Default */
    .menu-toggle, .hamburger-label {
      display: none;
    }

    /* --- Core Page Container --- */
    .main-content {
      max-width: 800px;
      margin: 4rem auto;
      padding: 0 2rem;
      text-align: center;
    }
    h1 {
      color: #ffffff;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #aaaaaa;
    }

    /* --- Mobile Breakpoint (Under 768px wide) --- */
    @media (max-width: 768px) {
      .hamburger-label {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 24px;
        height: 18px;
        cursor: pointer;
      }
      .hamburger-label span {
        display: block;
        height: 2px;
        width: 100%;
        background-color: #ffffff;
        border-radius: 2px;
        transition: all 0.3s ease;
      }

      .nav-menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background-color: #1a1a1a;
        flex-direction: column;
        padding: 1.5rem;
        box-sizing: border-box;
        border-top: 1px solid #2d2d2d;
      }
      .nav-category {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
        width: 100%;
      }
      .nav-category:last-child {
        margin-bottom: 0;
      }
      .category-title {
        border-right: none;
        border-bottom: 1px solid #333333;
        width: 100%;
        padding-bottom: 0.25rem;
        margin-bottom: 0.25rem;
      }
      .nav-item {
        padding-left: 0.5rem;
        font-size: 1.1rem;
        width: 100%;
      }

      .menu-toggle:checked ~ .nav-menu {
        display: flex;
      }
      .menu-toggle:checked ~ .hamburger-label span:nth-child(1) {
        transform: translateY(8px) rotate(45deg);
      }
      .menu-toggle:checked ~ .hamburger-label span:nth-child(2) {
        opacity: 0;
      }
      .menu-toggle:checked ~ .hamburger-label span:nth-child(3) {
        transform: translateY(-8px) rotate(-45deg);
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-brand">TokenHaven</a>

      <input type="checkbox" id="menu-toggle" class="menu-toggle">
      <label for="menu-toggle" class="hamburger-label">
        <span></span>
        <span></span>
        <span></span>
      </label>

      <div class="nav-menu">
        <!-- Category 1: Network Hub -->
        <div class="nav-category">
          <span class="category-title">Explore</span>
          <a href="index.html" class="nav-item active">Home</a>
          <a href="media.html" class="nav-item">Media Hub</a>
          <a href="pillars.html" class="nav-item">Pillars</a>
        </div>

        <!-- Category 2: Creations -->
        <div class="nav-category">
          <span class="category-title">Showcase</span>
          <a href="#" class="nav-item">Custom Mints</a>
          <a href="#" class="nav-item">Design Lab</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <h1>Welcome to TokenHaven</h1>
    <p>Your platform interface is fully connected. Use the menu above to transition through the network layers, view production media assets, or examine core ecosystem models.</p>
  </main>

</body>
</html>
